buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 23
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "23.1.7779620"
    }

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.1.1")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("com.google.gms:google-services:4.3.15")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }

    // ✅ Force Java 17 for all modules (fix Firebase error)
    tasks.withType(JavaCompile).configureEach {
        options.release = 17
    }
}

subprojects {
    afterEvaluate { project ->
        if (project.hasProperty("android")) {
            project.android {
                // ✅ AGP 8 FIX 1: Automatically inject namespace for older libraries like async-storage
                if (namespace == null) {
                    def manifestFile = file("src/main/AndroidManifest.xml")
                    if (manifestFile.exists()) {
                        def parsedManifest = new XmlParser().parse(manifestFile)
                        namespace = parsedManifest.@package
                    } else {
                        namespace = project.group
                    }
                }

                // ✅ AGP 8 FIX 2: Force BuildConfig generation for gesture-handler and others
                buildFeatures {
                    buildConfig true
                }

                compileOptions {
                    sourceCompatibility JavaVersion.VERSION_17
                    targetCompatibility JavaVersion.VERSION_17
                }
            }
        }
    }

    // ✅ Force DataStore resolution across all modules for Firebase
    project.configurations.all {
        resolutionStrategy.eachDependency { details ->
            if (details.requested.group == 'androidx.datastore') {
                details.useVersion '1.0.0'
            }
        }
    }
}