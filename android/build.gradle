buildscript {
    ext {
        buildToolsVersion = "34.0.0"
        minSdkVersion = 23
        compileSdkVersion = 34
        targetSdkVersion = 34
        ndkVersion = "23.1.7779620"
        // ✅ UPDATED: Modern Kotlin version required by the latest React Native libraries
        kotlinVersion = "1.9.24" 
    }

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.1.1")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("com.google.gms:google-services:4.3.15")
        
        // ✅ UPDATED: Linked to the variable above so it never mismatches again
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlinVersion")
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
    }

    // ✅ Explicitly set ALL Java compatibility flags to 17
    tasks.withType(JavaCompile).configureEach {
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
        options.release = 17
    }

    // ✅ Ensure Kotlin matches perfectly
    tasks.withType(org.jetbrains.kotlin.gradle.tasks.KotlinCompile).configureEach {
        kotlinOptions {
            jvmTarget = "17"
        }
    }
}

subprojects {
    afterEvaluate { project ->
        if (project.hasProperty("android")) {
            project.android {
                // AGP 8 FIX: Force namespace for libraries that still use old 'package' attribute
                if (namespace == null) {
                    try {
                        def manifestFile = file("src/main/AndroidManifest.xml")
                        if (manifestFile.exists()) {
                            def parsedManifest = new XmlParser().parse(manifestFile)
                            def packageName = parsedManifest.@package
                            if (packageName != null && !packageName.isEmpty()) {
                                namespace = packageName
                            } else {
                                namespace = project.group
                            }
                        } else {
                            namespace = project.group
                        }
                    } catch (Exception e) {
                        namespace = project.group
                    }
                }

                // Fix the specific "package attribute not supported" error
                sourceSets {
                    main {
                        manifest.srcFile 'src/main/AndroidManifest.xml'
                    }
                }

                buildFeatures {
                    buildConfig true
                }

                compileOptions {
                    sourceCompatibility JavaVersion.VERSION_17
                    targetCompatibility JavaVersion.VERSION_17
                }
            }
        }
    }

    // Force DataStore resolution
    project.configurations.all {
        resolutionStrategy.eachDependency { details ->
            if (details.requested.group == 'androidx.datastore') {
                details.useVersion '1.0.0'
            }
        }
    }
}